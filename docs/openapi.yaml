openapi: 3.1.0

info:
  version: 1.0.0
  title: Contacts API
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  description: Simple Contacts API (pagination, search, upload photo to Cloudinary)

servers:
  - url: http://localhost:3000
  - url: https://hw7-swagger-72ig.onrender.com

tags:
  - name: Contacts
    description: Contacts CRUD

paths:
  /contacts:
    get:
      $ref: './swagger/paths/contacts/get.yaml'
    post:
      $ref: './swagger/paths/contacts/post.yaml'

  /contacts/{contactId}:
    get:
      $ref: './swagger/paths/contacts/{contactId}/get.yaml'
    patch:
      $ref: './swagger/paths/contacts/{contactId}/patch.yaml'
    delete:
      $ref: './swagger/paths/contacts/{contactId}/delete.yaml'

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Contact:
      type: object
      properties:
        _id:
          type: string
          example: '66b91a...'
        name:
          type: string
          example: 'John'
        phoneNumber:
          type: string
          example: '12345678'
        email:
          type:
            - string
            - 'null'
          example: 'john@mail.com'
        isFavourite:
          type: boolean
          example: false
        contactType:
          type: string
          enum: [home, work, personal]
          example: personal
        photo:
          type:
            - string
            - 'null'
          example: 'https://res.cloudinary.com/.../photo.jpg'
        userId:
          type: string
          example: '66b91a...'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ContactCreateRequest:
      type: object
      required: [name, phoneNumber, contactType]
      properties:
        name:
          type: string
          example: 'John'
        phoneNumber:
          type: string
          example: '12345678'
        email:
          type: string
          example: 'john@mail.com'
        isFavourite:
          type: boolean
          example: false
        contactType:
          type: string
          enum: [home, work, personal]
        photo:
          type: string
          format: binary
          description: Фото (multipart/form-data)

    ContactUpdateRequest:
      type: object
      properties:
        name:
          type: string
          example: 'John Updated'
        phoneNumber:
          type: string
          example: '87654321'
        email:
          type: string
          example: 'john.updated@mail.com'
        isFavourite:
          type: boolean
          example: true
        contactType:
          type: string
          enum: [home, work, personal]
        photo:
          type: string
          format: binary

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 400
        message:
          type: string
          example: 'Something went wrong'
        data:
          type: string
          example: 'Validation error'

    PaginatedContacts:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Contact'
        total:
          type: integer
          example: 37
        page:
          type: integer
          example: 1
        perPage:
          type: integer
          example: 10
        totalPages:
          type: integer
          example: 4
