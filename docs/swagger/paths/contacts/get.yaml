tags:
  - Contacts
summary: Get contacts (list)
operationId: getContacts
description: Отримати список контактів з пагінацією/фільтрами.
parameters:
  - in: query
    name: page
    schema: { type: integer, minimum: 1, example: 1 }
  - in: query
    name: perPage
    schema: { type: integer, minimum: 1, example: 10 }
  - in: query
    name: sortBy
    schema: { type: string, example: createdAt }
  - in: query
    name: sortOrder
    schema: { type: string, enum: [asc, desc], example: desc }
  - in: query
    name: isFavourite
    schema: { type: boolean, example: false }
  - in: query
    name: contactType
    schema:
      type: string
      enum: [home, work, personal, business, other]
      example: personal
  - in: query
    name: search
    schema: { type: string, example: 'john' }
responses:
  '200':
    description: OK
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: 'Contacts fetched successfully'
            data:
              $ref: '../../../openapi.yaml#/components/schemas/PaginatedContacts'
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/ErrorResponse'
