tags:
  - Contacts
summary: Create a contact
operationId: createContact
description: Створити новий контакт (підтримка multipart/form-data з фото).
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        $ref: '../../../openapi.yaml#/components/schemas/ContactCreateRequest'
responses:
  '201':
    description: Created
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 201
            message:
              type: string
              example: 'Contact created successfully'
            data:
              $ref: '../../../openapi.yaml#/components/schemas/Contact'
  '400':
    description: Validation error
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/ErrorResponse'
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/ErrorResponse'
