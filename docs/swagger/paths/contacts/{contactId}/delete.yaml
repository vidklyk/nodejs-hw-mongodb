tags:
  - Contacts
summary: Delete contact
operationId: deleteContact
description: Видалити контакт за ідентифікатором.
parameters:
  - in: path
    name: contactId
    required: true
    schema: { type: string, example: '66b91a...' }
responses:
  '204':
    description: No Content (contact deleted)
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          $ref: '../../../../openapi.yaml#/components/schemas/ErrorResponse'
  '404':
    description: Contact not found
    content:
      application/json:
        schema:
          $ref: '../../../../openapi.yaml#/components/schemas/ErrorResponse'
