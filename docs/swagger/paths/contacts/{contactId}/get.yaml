tags:
  - Contacts
summary: Get contact by id
operationId: getContactById
description: Отримати контакт за його ідентифікатором.
parameters:
  - in: path
    name: contactId
    required: true
    schema: { type: string, example: '66b91a...' }
responses:
  '200':
    description: OK
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: 'Contact fetched successfully'
            data:
              $ref: '../../../../openapi.yaml#/components/schemas/Contact'
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          $ref: '../../../../openapi.yaml#/components/schemas/ErrorResponse'
  '404':
    description: Contact not found
    content:
      application/json:
        schema:
          $ref: '../../../../openapi.yaml#/components/schemas/ErrorResponse'
