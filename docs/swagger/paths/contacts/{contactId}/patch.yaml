tags:
  - Contacts
summary: Update contact
operationId: updateContact
description: Оновити контакт (підтримка multipart/form-data з фото).
parameters:
  - in: path
    name: contactId
    required: true
    schema: { type: string, example: '66b91a...' }
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        $ref: '../../../../openapi.yaml#/components/schemas/ContactUpdateRequest'
responses:
  '200':
    description: OK
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: 'Contact updated successfully'
            data:
              $ref: '../../../../openapi.yaml#/components/schemas/Contact'
  '400':
    description: Validation error
    content:
      application/json:
        schema:
          $ref: '../../../../openapi.yaml#/components/schemas/ErrorResponse'
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          $ref: '../../../../openapi.yaml#/components/schemas/ErrorResponse'
  '404':
    description: Contact not found
    content:
      application/json:
        schema:
          $ref: '../../../../openapi.yaml#/components/schemas/ErrorResponse'
